name: Budget Data Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r scripts/budget_pipeline/requirements.txt

      - name: Run pipeline (APBD) and emit frontend JSON
        env:
          REQUEST_DELAY_SEC: "1.5"
          TIMEOUT_SEC: "30"
          MAX_RETRIES: "4"
        run: |
          source .venv/bin/activate
          python scripts/budget_pipeline/fetch_real_apbd.py \
            --tahun 2026 \
            --source apbd \
            --emit-frontend-json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add data/apbd_daerah.json data/budget || true
            git commit -m "Automated update: regenerated APBD frontend data" || true
            git push
          else
            echo "No changes to commit."

